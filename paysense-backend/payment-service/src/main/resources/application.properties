server.port=8082

spring.application.name=payment-service

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paysense}
spring.datasource.username=${DB_USERNAME:paysense}
spring.datasource.password=${DB_PASSWORD:paysense123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=payment
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ── Razorpay ─────────────────────────────────────────────
razorpay.key.id=rzp_test_SfKgQ6b5LzF4VG
razorpay.key.secret=MWNRNWhd6cXJjVMRT4HaIDTX

# ── Kafka Producer ───────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Producer is configured explicitly in KafkaProducerConfig.java
# JsonSerializer for value, StringSerializer for key, acks=all, idempotent, retries=3

# ── Resilience4j Circuit Breaker (fraud-service) ────────
resilience4j.circuitbreaker.instances.fraudService.register-health-indicator=true
resilience4j.circuitbreaker.instances.fraudService.sliding-window-size=10
resilience4j.circuitbreaker.instances.fraudService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.fraudService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.fraudService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.fraudService.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.fraudService.slow-call-rate-threshold=80

# ── Service URLs ─────────────────────────────────────────
app.fraud-service.url=${FRAUD_SERVICE_URL:http://localhost:8084}

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ── Scheduling ───────────────────────────────────────────
spring.task.scheduling.pool.size=4
