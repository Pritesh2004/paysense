server.port=8086

spring.application.name=mcp-server

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paysense}
spring.datasource.username=${DB_USERNAME:paysense}
spring.datasource.password=${DB_PASSWORD:paysense123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=mcp
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ── JWT ──────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:your_jwt_secret_here}
app.jwt.expiration=${JWT_ACCESS_EXPIRY_MS:900000}

# ── Service URLs ─────────────────────────────────────────
app.transaction-service.url=${TRANSACTION_SERVICE_URL:http://localhost:8083}

# ── Gemini API ───────────────────────────────────────────
app.gemini.api-key=${GEMINI_API_KEY:your_api_key_here}
app.gemini.api-url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# ── Resilience4j Circuit Breaker (Gemini API) ────────────
resilience4j.circuitbreaker.instances.geminiApi.register-health-indicator=true
resilience4j.circuitbreaker.instances.geminiApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.geminiApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.geminiApi.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.geminiApi.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.geminiApi.slow-call-duration-threshold=10s
resilience4j.circuitbreaker.instances.geminiApi.slow-call-rate-threshold=80

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
