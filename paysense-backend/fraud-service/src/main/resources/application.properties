server.port=8084

spring.application.name=fraud-service

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paysense}
spring.datasource.username=${DB_USERNAME:paysense}
spring.datasource.password=${DB_PASSWORD:paysense123}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=fraud
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ── Kafka Consumer ───────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=fraud-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.paysense.*

# Kafka Producer (for FraudAlertEvent publishing)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ── Service URLs ─────────────────────────────────────────
app.payment-service.url=${PAYMENT_SERVICE_URL:http://localhost:8082}

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
