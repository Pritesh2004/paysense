server.port=8083

spring.application.name=transaction-service

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paysense}
spring.datasource.username=${DB_USERNAME:paysense}
spring.datasource.password=${DB_PASSWORD:paysense123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=transaction
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ── JWT ──────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:your_jwt_secret_here}
app.jwt.expiration=${JWT_ACCESS_EXPIRY_MS:900000}

# ── Kafka Consumer ───────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=transaction-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.paysense.*

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
